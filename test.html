<!doctype html>
<html lang="pt-BR" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Wrap Pro</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        .app-root {
            height: 100%;
            overflow: auto;
            background: #fafbfc;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-hover {
            transition: all 0.2s ease;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-green {
            background: #dcfce7;
            color: #16a34a;
        }

        .badge-yellow {
            background: #fef9c3;
            color: #a16207;
        }

        .badge-blue {
            background: #dbeafe;
            color: #2563eb;
        }

        .table-row:hover {
            background: #f8fafc;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d5dbe3;
            border-radius: 3px;
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full">
    <div class="app-root" id="appRoot"><!-- LOGIN -->
        <div id="login" class="h-full flex items-center justify-center p-4"
            style="background: linear-gradient(135deg, #f0fdf4 0%, #fafbfc 50%, #dcfce7 100%);">
            <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm fade-in">
                <div class="text-center mb-8">
                    <div
                        class="w-16 h-16 bg-green-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-green-200">
                        <i data-lucide="car" class="text-white" style="width:32px;height:32px;"></i>
                    </div>
                    <h1 class="text-2xl font-800 text-slate-900">Auto Wrap Pro</h1>
                    <p class="text-slate-500 text-sm mt-1">Sistema de Gestão Automotiva</p>
                </div>
                <div class="space-y-3"><button onclick="show('gestor')"
                        class="w-full bg-green-500 hover:bg-green-600 text-white rounded-xl py-3 font-600 text-sm flex items-center justify-center gap-2 transition">
                        <i data-lucide="shield" style="width:18px;height:18px;"></i> Gestor </button> <button
                        onclick="show('op')"
                        class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl py-3 font-600 text-sm flex items-center justify-center gap-2 transition">
                        <i data-lucide="wrench" style="width:18px;height:18px;"></i> Operador </button> <button
                        onclick="show('tv')"
                        class="w-full bg-slate-900 hover:bg-slate-800 text-white rounded-xl py-3 font-600 text-sm flex items-center justify-center gap-2 transition">
                        <i data-lucide="monitor" style="width:18px;height:18px;"></i> TV/Monitor </button>
                </div>
            </div>
        </div><!-- GESTOR -->
        <div id="gestor" class="h-full hidden flex">
            <aside class="w-64 bg-white border-r border-slate-200 p-5 overflow-auto">
                <div class="mb-6 flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center">
                        <i data-lucide="car" class="text-white" style="width:20px;height:20px;"></i>
                    </div>
                    <div>
                        <h2 class="font-700 text-slate-900">Auto Wrap Pro</h2>
                        <p class="text-xs text-slate-500">Painel Gestor</p>
                    </div>
                </div>
                <nav class="space-y-2" id="menu"></nav><button onclick="show('login')"
                    class="mt-6 w-full bg-red-50 hover:bg-red-100 text-red-600 rounded-xl py-2 font-500 text-sm flex items-center justify-center gap-2 transition"><i
                        data-lucide="log-out" style="width:16px;height:16px;"></i> Sair</button>
            </aside>
            <main class="flex-1 flex flex-col overflow-hidden">
                <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
                    <h1 id="title" class="text-lg font-700 text-slate-900">Dashboard</h1><span id="date"
                        class="text-sm text-slate-500"></span>
                </header>
                <div class="flex-1 overflow-auto p-6" id="content"></div>
            </main>
        </div><!-- OPERADOR -->
        <div id="op" class="h-full hidden flex flex-col">
            <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-green-500 rounded-xl flex items-center justify-center">
                        <i data-lucide="wrench" class="text-white" style="width:18px;height:18px;"></i>
                    </div>
                    <div>
                        <h2 class="font-700 text-slate-900">Auto Wrap Pro</h2>
                        <p class="text-xs text-slate-500">Operador</p>
                    </div>
                </div><button onclick="show('login')" class="p-2 rounded-lg hover:bg-slate-100"><i data-lucide="log-out"
                        style="width:18px;height:18px;"></i></button>
            </header>
            <div class="flex-1 overflow-auto p-4" id="opContent"></div>
            <nav class="bg-white border-t border-slate-200 flex justify-around py-2"><button
                    class="op-tab flex flex-col items-center gap-1 py-2 px-3 rounded-xl text-slate-500"
                    data-tab="avail"><i data-lucide="clipboard-list" style="width:20px;height:20px;"></i><span
                        class="text-xs font-500">Disponíveis</span></button> <button
                    class="op-tab flex flex-col items-center gap-1 py-2 px-3 rounded-xl text-slate-500"
                    data-tab="mine"><i data-lucide="user-check" style="width:20px;height:20px;"></i><span
                        class="text-xs font-500">Minhas OS</span></button> <button
                    class="op-tab flex flex-col items-center gap-1 py-2 px-3 rounded-xl text-green-600"
                    data-tab="check"><i data-lucide="check-square" style="width:20px;height:20px;"></i><span
                        class="text-xs font-500">Checklist</span></button>
            </nav>
        </div><!-- TV -->
        <div id="tv" class="h-full hidden p-6" style="background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);">
            <div class="flex flex-col h-full">
                <header class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 bg-green-500 rounded-2xl flex items-center justify-center shadow-lg shadow-green-500/30">
                            <i data-lucide="car" class="text-white" style="width:24px;height:24px;"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl font-800 text-white">Auto Wrap Pro</h1>
                            <p class="text-sm text-slate-400">Painel em Tempo Real</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p id="tvTime" class="text-3xl font-700 text-white">00:00</p>
                        <p id="tvDate" class="text-sm text-slate-400">--</p>
                    </div>
                </header>
                <div class="grid grid-cols-4 gap-4 mb-6" id="stats"></div>
                <div
                    class="flex-1 bg-white/5 backdrop-blur rounded-2xl border border-white/10 overflow-hidden flex flex-col">
                    <div class="p-4 border-b border-white/10 flex items-center gap-2">
                        <i data-lucide="activity" style="width:18px;height:18px;" class="text-green-400"></i>
                        <h3 class="text-white font-600">Ordens em Execução</h3>
                    </div>
                    <div class="flex-1 overflow-auto" id="tvTable"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // DEMO DATA
        const data = [
            { id: 'c1', type: 'client', name: 'João Silva', vehicle: 'BMW X5', plate: 'ABC-1234' },
            { id: 'c2', type: 'client', name: 'Maria Santos', vehicle: 'Mercedes C-Class', plate: 'XYZ-5678' },
            { id: 's1', type: 'service', name: 'PPF Completo', cat: 'PPF', price: 3500 },
            { id: 's2', type: 'service', name: 'Insulfilm', cat: 'Insufilm', price: 1200 },
            { id: 's3', type: 'service', name: 'Envelopamento', cat: 'Envelopamento', price: 2000 },
            { id: 'm1', type: 'material', name: 'PPF XPEL', brand: 'XPEL', qty: 50 },
            { id: 'col1', type: 'collab', name: 'Carlos Aplicador', role: 'Aplicador PPF' },
            { id: 'col2', type: 'collab', name: 'Pedro Instalador', role: 'Instalador' },
            { id: 'o1', type: 'order', client: 'João Silva', vehicle: 'BMW X5', plate: 'ABC-1234', service: 'PPF Completo', total: 3500, status: 'Em Execução', op: 'Carlos Aplicador', date: '2024-01-15' },
            { id: 'o2', type: 'order', client: 'Maria Santos', vehicle: 'Mercedes C-Class', plate: 'XYZ-5678', service: 'Insulfilm', total: 1200, status: 'Aprovado', op: '', date: '2024-01-18' },
            { id: 'o3', type: 'order', client: 'João Silva', vehicle: 'BMW X5', plate: 'ABC-1234', service: 'Envelopamento', total: 2000, status: 'Orçamento', op: '', date: '2024-01-16' },
            { id: 'o4', type: 'order', client: 'Maria Santos', vehicle: 'Mercedes C-Class', plate: 'XYZ-5678', service: 'PPF Parcial', total: 1500, status: 'Concluído', op: 'Pedro Instalador', date: '2024-01-10' },
        ];

        let currentPage = 'dashboard';

        function show(view) {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('gestor').classList.add('hidden');
            document.getElementById('op').classList.add('hidden');
            document.getElementById('tv').classList.add('hidden');
            document.getElementById(view).classList.remove('hidden');

            if (view === 'gestor') renderGestor();
            else if (view === 'op') renderOp();
            else if (view === 'tv') renderTV();
        }

        function renderGestor() {
            // Menu
            const menu = document.getElementById('menu');
            menu.innerHTML = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                { id: 'clients', icon: 'users', label: 'Clientes' },
                { id: 'services', icon: 'wrench', label: 'Serviços' },
                { id: 'materials', icon: 'package', label: 'Materiais' },
                { id: 'collab', icon: 'hard-hat', label: 'Colaboradores' },
                { id: 'orders', icon: 'clipboard-list', label: 'Ordens' },
            ].map(m => `<div class="p-2.5 rounded-lg cursor-pointer hover:bg-slate-100 text-slate-600 font-500 text-sm transition" onclick="setPage('${m.id}')" style="${currentPage === m.id ? 'background:#f0fdf4;color:#16a34a;font-weight:600' : ''}">
    <div class="flex items-center gap-2"><i data-lucide="${m.icon}" style="width:18px;height:18px;"></i>${m.label}</div>
  </div>`).join('');

            // Content
            const content = document.getElementById('content');
            document.getElementById('title').textContent = ['Dashboard', 'Clientes', 'Serviços', 'Materiais', 'Colaboradores', 'Ordens'][['dashboard', 'clients', 'services', 'materials', 'collab', 'orders'].indexOf(currentPage)];
            document.getElementById('date').textContent = new Date().toLocaleDateString('pt-BR');

            if (currentPage === 'dashboard') {
                const clients = data.filter(d => d.type === 'client').length;
                const orders = data.filter(d => d.type === 'order');
                const inExec = orders.filter(o => o.status === 'Em Execução').length;
                const completed = orders.filter(o => o.status === 'Concluído').length;
                const revenue = orders.filter(o => o.status === 'Concluído').reduce((s, o) => s + o.total, 0);

                content.innerHTML = `<div class="fade-in grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-2xl p-5 border border-slate-200 card-hover">
        <div class="flex items-center justify-between mb-3">
          <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center"><i data-lucide="users" style="width:20px;height:20px;" class="text-blue-600"></i></div>
        </div>
        <p class="text-2xl font-800 text-slate-900">${clients}</p>
        <p class="text-sm text-slate-500">Clientes</p>
      </div>
      <div class="bg-white rounded-2xl p-5 border border-slate-200 card-hover">
        <div class="flex items-center justify-between mb-3">
          <div class="w-10 h-10 bg-yellow-50 rounded-xl flex items-center justify-center"><i data-lucide="file-text" style="width:20px;height:20px;" class="text-yellow-600"></i></div>
        </div>
        <p class="text-2xl font-800 text-slate-900">${orders.filter(o => o.status === 'Orçamento').length}</p>
        <p class="text-sm text-slate-500">Orçamentos</p>
      </div>
      <div class="bg-white rounded-2xl p-5 border border-slate-200 card-hover">
        <div class="flex items-center justify-between mb-3">
          <div class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center"><i data-lucide="zap" style="width:20px;height:20px;" class="text-green-600"></i></div>
        </div>
        <p class="text-2xl font-800 text-slate-900">${inExec}</p>
        <p class="text-sm text-slate-500">Em Execução</p>
      </div>
      <div class="bg-white rounded-2xl p-5 border border-slate-200 card-hover">
        <div class="flex items-center justify-between mb-3">
          <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center"><i data-lucide="trending-up" style="width:20px;height:20px;" class="text-purple-600"></i></div>
        </div>
        <p class="text-2xl font-800 text-slate-900">R$ ${(revenue / 1000).toFixed(1)}k</p>
        <p class="text-sm text-slate-500">Faturamento</p>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="bg-white rounded-2xl p-5 border border-slate-200">
        <h3 class="font-700 text-slate-900 mb-4 flex items-center gap-2"><i data-lucide="clock" style="width:18px;height:18px;" class="text-green-500"></i>Ordens Recentes</h3>
        ${orders.slice(-3).reverse().map(o => `<div class="flex justify-between py-3 border-b last:border-0">
          <div><p class="font-500 text-slate-700 text-sm">${o.client}</p><p class="text-xs text-slate-500">${o.vehicle}</p></div>
          <span class="badge ${o.status === 'Em Execução' ? 'badge-yellow' : o.status === 'Concluído' ? 'badge-green' : o.status === 'Aprovado' ? 'badge-blue' : 'bg-slate-100 text-slate-600'}">${o.status}</span>
        </div>`).join('')}
      </div>
      <div class="bg-white rounded-2xl p-5 border border-slate-200">
        <h3 class="font-700 text-slate-900 mb-4 flex items-center gap-2"><i data-lucide="pie-chart" style="width:18px;height:18px;" class="text-green-500"></i>Por Categoria</h3>
        ${['PPF', 'Insufilm', 'Envelopamento'].map(cat => {
                    const count = orders.filter(o => o.service.includes(cat)).length;
                    const pct = orders.length ? Math.round(count / orders.length * 100) : 0;
                    return `<div class="mb-3"><div class="flex justify-between text-sm mb-1"><span class="text-slate-600">${cat}</span><span class="text-slate-500">${count}</span></div>
          <div class="h-2 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-green-500 rounded-full" style="width:${pct}%"></div></div></div>`;
                }).join('')}
      </div>
    </div>`;
            } else if (currentPage === 'clients') {
                const clients = data.filter(d => d.type === 'client');
                content.innerHTML = `<div class="fade-in">
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead><tr class="bg-slate-50 text-slate-600"><th class="py-3 px-4 text-left font-600">Nome</th><th class="py-3 px-4 text-left font-600">Veículo</th><th class="py-3 px-4 text-left font-600">Placa</th></tr></thead>
          <tbody>${clients.map(c => `<tr class="table-row border-t"><td class="py-3 px-4 font-500">${c.name}</td><td class="py-3 px-4 text-slate-600">${c.vehicle}</td><td class="py-3 px-4"><span class="bg-slate-100 px-2 py-1 rounded text-xs font-600">${c.plate}</span></td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
            } else if (currentPage === 'services') {
                const services = data.filter(d => d.type === 'service');
                content.innerHTML = `<div class="fade-in grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      ${services.map(s => `<div class="bg-white rounded-2xl p-4 border border-slate-200 card-hover">
        <span class="badge ${s.cat === 'PPF' ? 'badge-blue' : s.cat === 'Insufilm' ? 'bg-purple-100 text-purple-600' : s.cat === 'Envelopamento' ? 'badge-green' : 'bg-yellow-100 text-yellow-600'}">${s.cat}</span>
        <h4 class="font-600 text-slate-900 mt-2">${s.name}</h4>
        <p class="text-lg font-700 text-green-600 mt-2">R$ ${s.price.toLocaleString('pt-BR')}</p>
      </div>`).join('')}
    </div>`;
            } else if (currentPage === 'materials') {
                const materials = data.filter(d => d.type === 'material');
                content.innerHTML = `<div class="fade-in bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-slate-50 text-slate-600"><th class="py-3 px-4 text-left font-600">Material</th><th class="py-3 px-4 text-left font-600">Marca</th><th class="py-3 px-4 text-left font-600">Qtd</th></tr></thead>
        <tbody>${materials.map(m => `<tr class="table-row border-t"><td class="py-3 px-4 font-500">${m.name}</td><td class="py-3 px-4 text-slate-600">${m.brand}</td><td class="py-3 px-4">${m.qty} m²</td></tr>`).join('')}</tbody>
      </table>
    </div>`;
            } else if (currentPage === 'collab') {
                const collabs = data.filter(d => d.type === 'collab');
                content.innerHTML = `<div class="fade-in grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      ${collabs.map(c => `<div class="bg-white rounded-2xl p-4 border border-slate-200 card-hover">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center text-green-600 font-700">${c.name[0]}</div>
          <div><h4 class="font-600 text-slate-900 text-sm">${c.name}</h4><p class="text-xs text-slate-500">${c.role}</p></div>
        </div>
      </div>`).join('')}
    </div>`;
            } else if (currentPage === 'orders') {
                const orders = data.filter(d => d.type === 'order');
                content.innerHTML = `<div class="fade-in space-y-3">
      ${orders.map(o => `<div class="bg-white rounded-2xl p-4 border border-slate-200 card-hover">
        <div class="flex justify-between items-start">
          <div><h4 class="font-600 text-slate-900">${o.client}</h4><p class="text-sm text-slate-600">${o.vehicle} • ${o.plate}</p><p class="text-xs text-slate-500 mt-1">${o.service}</p></div>
          <div class="text-right"><p class="text-lg font-700 text-green-600">R$ ${o.total.toLocaleString('pt-BR')}</p><span class="badge ${o.status === 'Em Execução' ? 'badge-yellow' : o.status === 'Concluído' ? 'badge-green' : o.status === 'Aprovado' ? 'badge-blue' : 'bg-slate-100 text-slate-600'}">${o.status}</span></div>
        </div>
      </div>`).join('')}
    </div>`;
            }

            lucide.createIcons();
        }

        function setPage(page) {
            currentPage = page;
            renderGestor();
        }

        function renderOp() {
            const orders = data.filter(d => d.type === 'order' && d.status !== 'Orçamento');
            let tab = 'check';

            document.querySelectorAll('.op-tab').forEach((b, i) => {
                b.onclick = function () {
                    tab = this.dataset.tab;
                    renderOp();
                };
                if (this && this.dataset.tab === 'check') this.classList.add('text-green-600', 'font-600');
            });

            const content = document.getElementById('opContent');

            if (tab === 'avail') {
                const avail = orders.filter(o => o.status === 'Aprovado' && !o.op);
                content.innerHTML = avail.length === 0 ? '<p class="text-center text-slate-500 py-8">Nenhuma ordem disponível</p>' :
                    avail.map(o => `<div class="bg-white rounded-2xl p-4 border border-slate-200 mb-3">
      <div class="flex justify-between"><div><p class="font-600 text-slate-900">${o.client}</p><p class="text-sm text-slate-600">${o.vehicle} • ${o.plate}</p></div></div>
      <p class="text-xs text-slate-500 mt-1">${o.service}</p>
      <button class="mt-3 w-full bg-green-500 hover:bg-green-600 text-white rounded-xl py-2 font-600 text-sm transition">Assumir OS</button>
    </div>`).join('');
            } else if (tab === 'mine') {
                const mine = orders.filter(o => o.op && o.status !== 'Concluído');
                content.innerHTML = mine.length === 0 ? '<p class="text-center text-slate-500 py-8">Nenhuma ordem</p>' :
                    mine.map(o => `<div class="bg-white rounded-2xl p-4 border border-slate-200 mb-3">
      <div class="flex justify-between items-start"><div><p class="font-600 text-slate-900">${o.client}</p><p class="text-sm text-slate-600">${o.vehicle}</p></div><span class="badge badge-${o.status === 'Em Execução' ? 'yellow' : 'blue'}">${o.status}</span></div>
      <p class="text-xs text-slate-500 mt-1">${o.service}</p>
      <button class="mt-3 w-full bg-blue-500 hover:bg-blue-600 text-white rounded-xl py-2 font-600 text-sm transition">${o.status === 'Aprovado' ? 'Iniciar' : 'Concluir'}</button>
    </div>`).join('');
            } else {
                const mine = orders.filter(o => o.op);
                content.innerHTML = mine.length === 0 ? '<p class="text-center text-slate-500 py-8">Nenhuma OS</p>' :
                    mine.map(o => `<div class="bg-white rounded-2xl p-4 border border-slate-200 mb-3">
      <p class="font-600 text-slate-900 mb-2">${o.client} - ${o.vehicle}</p>
      <div class="h-2 bg-slate-200 rounded-full mb-3"><div class="h-full bg-green-500 rounded-full" style="width:60%"></div></div>
      <div class="space-y-2 text-sm">
        <label class="flex items-center gap-2"><input type="checkbox" checked class="accent-green-500"><span class="text-slate-600">Verificar pintura</span></label>
        <label class="flex items-center gap-2"><input type="checkbox" checked class="accent-green-500"><span class="text-slate-600">Lavar veículo</span></label>
        <label class="flex items-center gap-2"><input type="checkbox" class="accent-green-500"><span class="text-slate-600">Preparar superfície</span></label>
      </div>
    </div>`).join('');
            }

            lucide.createIcons();
        }

        function renderTV() {
            const orders = data.filter(d => d.type === 'order').filter(o => o.status !== 'Cancelado');
            const inExec = orders.filter(o => o.status === 'Em Execução').length;
            const approved = orders.filter(o => o.status === 'Aprovado').length;
            const done = orders.filter(o => o.status === 'Concluído').length;

            function updateTime() {
                const now = new Date();
                document.getElementById('tvTime').textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('tvDate').textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
            }
            updateTime();
            setInterval(updateTime, 1000);

            document.getElementById('stats').innerHTML = [
                { label: 'Em Execução', value: inExec, icon: 'zap', bg: 'bg-amber-500/20', text: 'text-amber-400' },
                { label: 'Aguardando', value: approved, icon: 'clock', bg: 'bg-blue-500/20', text: 'text-blue-400' },
                { label: 'Concluídas', value: done, icon: 'check-circle', bg: 'bg-green-500/20', text: 'text-green-400' },
                { label: 'Total', value: orders.length, icon: 'clipboard-list', bg: 'bg-purple-500/20', text: 'text-purple-400' },
            ].map(s => `<div class="${s.bg} rounded-2xl p-4 border border-white/5">
    <div class="flex items-center gap-2 mb-2"><i data-lucide="${s.icon}" style="width:18px;height:18px;" class="${s.text}"></i><span class="text-sm text-slate-400">${s.label}</span></div>
    <p class="text-3xl font-800 text-white">${s.value}</p>
  </div>`).join('');

            const active = orders.filter(o => o.status === 'Em Execução' || o.status === 'Aprovado');
            document.getElementById('tvTable').innerHTML = `<table class="w-full">
    <thead><tr class="text-slate-400 text-sm border-b border-white/10 text-left"><th class="py-3 px-4 font-500">Status</th><th class="py-3 px-4 font-500">Cliente</th><th class="py-3 px-4 font-500">Veículo</th><th class="py-3 px-4 font-500">Placa</th><th class="py-3 px-4 font-500">Operador</th></tr></thead>
    <tbody>${active.map(o => `<tr class="text-white border-b border-white/5">
      <td class="py-4 px-4"><span class="px-3 py-1 rounded-full text-xs font-600 ${o.status === 'Em Execução' ? 'bg-amber-500/20 text-amber-400' : 'bg-blue-500/20 text-blue-400'}">${o.status}</span></td>
      <td class="py-4 px-4 font-500">${o.client}</td>
      <td class="py-4 px-4 text-slate-300">${o.vehicle}</td>
      <td class="py-4 px-4"><span class="bg-white/10 px-2 py-1 rounded text-xs font-600">${o.plate}</span></td>
      <td class="py-4 px-4 text-green-400 font-500">${o.op || '-'}</td>
    </tr>`).join('')}</tbody>
  </table>`;

            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
